<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each canvas and "Save image as" to create your PWA icons.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, s, s);
    ctx.strokeStyle = '#f5c518';
    ctx.lineWidth = s * 0.02;
    ctx.beginPath();
    for (let x = 0; x < s; x++) {
        const t = (x / s) * Math.PI * 4;
        const y = s/2 + Math.sin(t) * s * 0.25 + Math.sin(t*2) * s * 0.1 + Math.sin(t*3) * s * 0.05;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.fillStyle = '#f5c518';
    ctx.font = `bold ${s * 0.15}px Courier New`;
    ctx.textAlign = 'center';
    ctx.fillText('TL', s/2, s * 0.88);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
